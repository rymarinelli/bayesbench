site_name: bayesbench
site_description: Bayesian sequential benchmarking for LLMs and agents.
site_url: https://rymarinelli.github.io/bayesbench/
repo_url: https://github.com/rymarinelli/bayesbench

theme:
  name: material

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          paths: [src]

nav:
  - Home: index.md
  - Getting Started: getting-started.md
  - Workflow Playbooks: workflows.md
  - Examples Gallery: examples.md
  - Concepts & Tuning: concepts.md
  - Adapters: adapters.md
  - API Reference: api-reference.md
